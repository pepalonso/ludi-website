services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${GO_SERVER_PORT:-8080}:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=${DATABASE_PORT:-3306}
      - DB_NAME=${DATABASE_NAME:-tournament}
      - DB_USER=${DATABASE_USER:-tournament_user}
      - DB_PASSWORD=${DATABASE_PASSWORD:-tournament_dev_pass}
      - APP_ENV=development
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tournament-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin_dev_root}
      MYSQL_DATABASE: ${DB_NAME:-tournament}
      MYSQL_USER: ${DB_USER:-tournament_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tournament_dev_pass}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - tournament-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-admin_dev_root}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tournament-network

volumes:
  db_data:
    driver: local

networks:
  tournament-network:
    driver: bridge
