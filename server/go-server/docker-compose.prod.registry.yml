# Production compose for deploy-from-registry: no build on server.
# Set APP_IMAGE (e.g. docker.io/myuser/ludi-server:1.0.0) when running.
# Use with: docker compose -f docker-compose.prod.registry.yml --env-file .env.prod.local up -d

services:
  app:
    image: ${APP_IMAGE}
    # Bind to 0.0.0.0 so Cloudflare tunnel (e.g. host.docker.internal:8081) can reach the app
    ports:
      - "0.0.0.0:${GO_SERVER_PORT:-8081}:8080"
    env_file:
      - .env.prod.local
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tournament-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/backups:/backups
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - tournament-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local

networks:
  tournament-network:
    driver: bridge
