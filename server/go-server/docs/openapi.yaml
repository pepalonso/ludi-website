openapi: 3.0.3
info:
  title: Ludibàsquet API
  description: API for managing tournament clubs, players, and coaches
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /health:
    get:
      summary: Health check
      description: Check if the API is running
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  uptime:
                    type: string
                    example: "2h15m30s"

  /api/clubs:
    get:
      summary: List all clubs
      description: Retrieve all clubs in the system
      responses:
        "200":
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new club
      description: Create a new club in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Name of the club
                  example: "Barcelona Basketball Club"
      responses:
        "201":
          description: Club created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/clubs/{id}:
    get:
      summary: Get club by ID
      description: Retrieve a specific club by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Club ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "200":
          description: Club found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update club
      description: Update an existing club
      parameters:
        - name: id
          in: path
          required: true
          description: Club ID
          schema:
            type: integer
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Name of the club
                  example: "FC Barcelona Basketball"
      responses:
        "200":
          description: Club updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete club
      description: Delete a club from the system
      parameters:
        - name: id
          in: path
          required: true
          description: Club ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "204":
          description: Club deleted successfully
        "404":
          description: Club not found

  /api/players:
    get:
      summary: List players
      description: Retrieve a list of players
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

    post:
      summary: Create a new player
      description: Create a new player in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - shirt_size
                - team_id
              properties:
                first_name:
                  type: string
                  example: "John"
                last_name:
                  type: string
                  example: "Doe"
                shirt_size:
                  type: string
                  example: "M"
                team_id:
                  type: integer
                  example: 123
      responses:
        "201":
          description: Player created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /api/players/{id}:
    get:
      summary: Get player by ID
      description: Retrieve a specific player by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Player ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "200":
          description: Player found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

    put:
      summary: Update player
      description: Update an existing player
      parameters:
        - name: id
          in: path
          required: true
          description: Player ID
          schema:
            type: integer
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - shirt_size
              properties:
                first_name:
                  type: string
                  example: "Johnny"
                last_name:
                  type: string
                  example: "Doe"
                shirt_size:
                  type: string
                  example: "L"
      responses:
        "200":
          description: Player updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

    delete:
      summary: Delete player
      description: Delete a player from the system
      parameters:
        - name: id
          in: path
          required: true
          description: Player ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "204":
          description: Player deleted successfully

  /api/coaches:
    get:
      summary: List coaches
      description: Retrieve a list of coaches
      responses:
        "200":
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coach"

    post:
      summary: Create a new coach
      description: Create a new coach in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - shirt_size
                - phone
                - team_id
              properties:
                first_name:
                  type: string
                  example: "Mike"
                last_name:
                  type: string
                  example: "Johnson"
                shirt_size:
                  type: string
                  enum:
                    [
                      "8",
                      "10",
                      "12",
                      "14",
                      "S",
                      "M",
                      "L",
                      "XL",
                      "2XL",
                      "3XL",
                      "4XL",
                    ]
                  example: "M"
                phone:
                  type: string
                  example: "+34612345678"
                email:
                  type: string
                  format: email
                  example: "mike@example.com"
                team_id:
                  type: integer
                  minimum: 1
                  example: 1
                is_head_coach:
                  type: boolean
                  default: false
                  example: false
      responses:
        "201":
          description: Coach created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coach"

  /api/coaches/{id}:
    get:
      summary: Get coach by ID
      description: Retrieve a specific coach by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Coach ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "200":
          description: Coach found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coach"

    put:
      summary: Update coach
      description: Update an existing coach
      parameters:
        - name: id
          in: path
          required: true
          description: Coach ID
          schema:
            type: integer
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - shirt_size
                - phone
                - team_id
              properties:
                first_name:
                  type: string
                  example: "Mike"
                last_name:
                  type: string
                  example: "Johnson"
                shirt_size:
                  type: string
                  enum:
                    [
                      "8",
                      "10",
                      "12",
                      "14",
                      "S",
                      "M",
                      "L",
                      "XL",
                      "2XL",
                      "3XL",
                      "4XL",
                    ]
                  example: "M"
                phone:
                  type: string
                  example: "+34612345678"
                email:
                  type: string
                  format: email
                  example: "mike@example.com"
                team_id:
                  type: integer
                  minimum: 1
                  example: 1
                is_head_coach:
                  type: boolean
                  default: false
                  example: false
      responses:
        "200":
          description: Coach updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coach"

    delete:
      summary: Delete coach
      description: Delete a coach from the system
      parameters:
        - name: id
          in: path
          required: true
          description: Coach ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "204":
          description: Coach deleted successfully

  /api/allergies:
    get:
      summary: List allergies
      responses:
        "200":
          description: List of allergies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Allergy"

    post:
      summary: Create allergy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllergyCreateRequest"
      responses:
        "201":
          description: Allergy created

  /api/allergies/{id}:
    delete:
      summary: Delete allergy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Allergy deleted

  /api/allergies/team/{team_id}:
    get:
      summary: Get allergies by team
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Allergies for team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Allergy"

  /api/teams:
    get:
      summary: List teams
      description: Retrieve a paginated list of teams with optional filters
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: club_id
          in: query
          required: false
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: ["Pre-mini", "Mini", "Pre-infantil", "Infantil", "Cadet", "Júnior"]
        - name: gender
          in: query
          required: false
          schema:
            type: string
            enum: ["Masculí", "Femení"]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: ["pending_payment", "canceled", "active"]
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a new team
      description: Create a new team in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamCreateRequest"
      responses:
        "201":
          description: Team created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/teams/stats:
    get:
      summary: Get team statistics
      description: Retrieve aggregate statistics for teams
      responses:
        "200":
          description: Team statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamStats"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/teams/{id}:
    get:
      summary: Get team by ID
      description: Retrieve a specific team by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Team ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "200":
          description: Team found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          description: Team not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update team
      description: Update an existing team
      parameters:
        - name: id
          in: path
          required: true
          description: Team ID
          schema:
            type: integer
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdateRequest"
      responses:
        "200":
          description: Team updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Team not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents:
    get:
      summary: List documents
      description: Retrieve a paginated list of documents with optional filters
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
        - name: document_type
          in: query
          required: false
          schema:
            type: string
            enum: ["medical_certificate", "parental_consent", "photo_release", "other"]
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/upload:
    post:
      summary: Upload a document
      description: Upload a file. team_id is optional; documents can exist without a team and be assigned later. File is stored locally; third-party sync is done asynchronously.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - document_type
              properties:
                file:
                  type: string
                  format: binary
                  description: The document file
                team_id:
                  type: integer
                  description: Optional. Team to assign; omit to create an unassigned document.
                document_type:
                  type: string
                  enum: ["medical_certificate", "parental_consent", "photo_release", "other"]
      responses:
        "201":
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}:
    get:
      summary: Get document by ID
      description: Retrieve document metadata by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update document team assignment
      description: Only team_id can be updated; omit or null to unassign.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdateRequest"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid team_id or team not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Club:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Barcelona Basketball Club"
        created_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
      required:
        - id
        - name

    Player:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: "John"
        last_name:
          type: string
          example: "Doe"
        shirt_size:
          type: string
          example: "M"
        team_id:
          type: integer
          example: 123
        created_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
      required:
        - id
        - first_name
        - last_name
        - shirt_size

    Coach:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: "Mike"
        last_name:
          type: string
          example: "Johnson"
        shirt_size:
          type: string
          enum:
            ["8", "10", "12", "14", "S", "M", "L", "XL", "2XL", "3XL", "4XL"]
          example: "M"
        phone:
          type: string
          example: "+34612345678"
        email:
          type: string
          format: email
          example: "mike@example.com"
        team_id:
          type: integer
          example: 1
        is_head_coach:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
      required:
        - id
        - first_name
        - last_name
        - shirt_size
        - phone
        - team_id

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Resource not found"
      required:
        - error

    Allergy:
      type: object
      properties:
        id:
          type: integer
        player_id:
          type: integer
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AllergyCreateRequest:
      type: object
      properties:
        player_id:
          type: integer
        description:
          type: string
      required:
        - player_id

    Team:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Club Barca Mini"
        email:
          type: string
          format: email
          example: "mini@club.com"
        category:
          type: string
          enum: ["Pre-mini", "Mini", "Pre-infantil", "Infantil", "Cadet", "Júnior"]
          example: "Mini"
        phone:
          type: string
          example: "+34600000000"
        gender:
          type: string
          enum: ["Masculí", "Femení"]
          example: "Masculí"
        club_id:
          type: integer
          example: 1
        observations:
          type: string
          nullable: true
        registration_date:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-01-19T20:30:00Z"
        status:
          type: string
          enum: ["pending_payment", "canceled", "active"]
          example: "pending_payment"
      required:
        - id
        - name
        - email
        - category
        - phone
        - gender
        - club_id
        - status

    TeamCreateRequest:
      type: object
      required:
        - name
        - email
        - category
        - phone
        - gender
        - club_id
      properties:
        name:
          type: string
          example: "Club Barca Mini"
        email:
          type: string
          format: email
          example: "mini@club.com"
        category:
          type: string
          enum: ["Pre-mini", "Mini", "Pre-infantil", "Infantil", "Cadet", "Júnior"]
          example: "Mini"
        phone:
          type: string
          example: "+34600000000"
        gender:
          type: string
          enum: ["Masculí", "Femení"]
          example: "Masculí"
        club_id:
          type: integer
          minimum: 1
          example: 1
        observations:
          type: string
          nullable: true
        status:
          type: string
          enum: ["pending_payment", "canceled", "active"]
          default: "pending_payment"
          example: "pending_payment"

    TeamUpdateRequest:
      type: object
      required:
        - name
        - email
        - category
        - phone
        - gender
        - club_id
      properties:
        name:
          type: string
          example: "Club Barca Mini"
        email:
          type: string
          format: email
          example: "mini@club.com"
        category:
          type: string
          enum: ["Pre-mini", "Mini", "Pre-infantil", "Infantil", "Cadet", "Júnior"]
          example: "Mini"
        phone:
          type: string
          example: "+34600000000"
        gender:
          type: string
          enum: ["Masculí", "Femení"]
          example: "Masculí"
        club_id:
          type: integer
          minimum: 1
          example: 1
        observations:
          type: string
          nullable: true
        status:
          type: string
          enum: ["pending_payment", "canceled", "active"]
          example: "active"

    TeamListResponse:
      type: object
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total_pages:
          type: integer
          example: 5
      required:
        - teams
        - total
        - page
        - page_size
        - total_pages

    TeamStats:
      type: object
      properties:
        total_teams:
          type: integer
          example: 100
        active_teams:
          type: integer
          example: 80
        pending_payment:
          type: integer
          example: 15
        canceled_teams:
          type: integer
          example: 5
        by_category:
          type: object
          additionalProperties:
            type: integer
          description: Count per category (Pre-mini, Mini, etc.)
        by_gender:
          type: object
          additionalProperties:
            type: integer
          description: Count per gender (Masculí, Femení)
      required:
        - total_teams
        - active_teams
        - pending_payment
        - canceled_teams
        - by_category
        - by_gender

    Document:
      type: object
      properties:
        id:
          type: integer
          example: 1
        team_id:
          type: integer
          nullable: true
          description: Optional; null when document is not assigned to a team
          example: 1
        document_type:
          type: string
          enum: ["medical_certificate", "parental_consent", "photo_release", "other"]
          example: "medical_certificate"
        file_name:
          type: string
          example: "cert.pdf"
        file_path:
          type: string
          description: Server path where file is stored
        file_size:
          type: integer
          nullable: true
        mime_type:
          type: string
          nullable: true
        uploaded_at:
          type: string
          format: date-time
      required:
        - id
        - document_type
        - file_name
        - file_path
        - uploaded_at

    DocumentUpdateRequest:
      type: object
      description: Only team_id can be updated; omit or null to unassign.
      properties:
        team_id:
          type: integer
          nullable: true
          description: Optional. Set to assign or change team; omit or null to unassign.
          example: 1

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
      required:
        - documents
        - total
        - page
        - page_size
        - total_pages
